site_name: Mahoraga
site_url: https://hingebase.github.io/mahoraga/
repo_url: https://github.com/hingebase/mahoraga
repo_name: hingebase/mahoraga
edit_uri: blob/main/docs/

nav:
  - Introduction: index.md
  - tutorial.md
  - Advanced:
      - advanced/panel.md
      - advanced/pyapp.md
  - changelog.md

theme:
  favicon: assets/images/favicon.svg
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - navigation.top
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/images/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - zensical.extensions.macros:
      module_name: scripts/_mkdocs_macros
      on_error_fail: true
      on_undefined: strict

plugins:
  - offline
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hingebase/mahoraga
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mahoraga/
