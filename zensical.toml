[project]
edit_uri = "blob/main/docs/"
extra_css = ["assets/stylesheets/extra.css"]
nav = [
    { Introduction = "index.md" },
    "tutorial.md",
    { Advanced = [
        "advanced/shards.md",
        "advanced/panel.md",
        "advanced/pyapp.md",
    ] },
    "changelog.md",
]
repo_name = "hingebase/mahoraga"
repo_url = "https://github.com/hingebase/mahoraga"
site_name = "Mahoraga"
site_url = "https://hingebase.github.io/mahoraga/"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/hingebase/mahoraga"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/mahoraga/"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.zensical.extensions.macros]
module_name = "scripts/_mkdocs_macros"
on_error_fail = true
on_undefined = "strict"

[project.plugins.offline]

[project.theme]
favicon = "assets/images/favicon.svg"
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.tabs.link",
    "navigation.top",
    "toc.follow",
]
icon.repo = "fontawesome/brands/github"
logo = "assets/images/logo.svg"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
