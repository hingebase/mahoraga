name: TestPyPI

on:
  push:
    branches:
      - testpypi

permissions: read-all

jobs:
  pypi:
    name: Publish to TestPyPI
    permissions:
      id-token: write
    runs-on: ubuntu-slim
    environment:
      name: testpypi
      url: https://test.pypi.org/project/mahoraga
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false
      - run: uv build
      - uses: astral-sh/attest-action@v0.0.6
      - run: uv publish --index testpypi --trusted-publishing always
